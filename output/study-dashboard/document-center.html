    * {

    body {

    button {

    }

    .shell {

      margin: 0 auto;

    .hero,
    .doc,
    .nav-card,

      border-radius: 8px;
      background: var(--surface);

      background: var(--mint);
      color: #064e3b;
      font-size: 12px;
      font-weight: 900;

    }

      font-size: 15px;
      font-weight: 650;

      min-height: 38px;
      padding: 8px 12px;

      border-radius: 8px;

      font-weight: 900;
      white-space: nowrap;

      grid-template-columns: 330px minmax(0, 1fr);

      align-items: start;
    }

      padding: 14px;
      background: #fffdf7;
    }

      font-size: 16px;

      padding: 9px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 2px 2px 0 var(--line);
      color: var(--ink);
      cursor: pointer;
      text-align: left;
    }

      background: var(--ink);
      color: #fff;
      box-shadow: 3px 3px 0 var(--line);

      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: var(--sky);
      font-size: 16px;
    }

    .doc-button:hover .emoji {
      background: #fff;
    }

    .doc-button strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
    }

    .doc-button span:not(.emoji) {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .doc-button.active span:not(.emoji),
    .doc-button:hover span:not(.emoji) {
      color: #dbeafe;
    }

      min-height: 620px;
      padding: 22px;
      background: #fff;
    }

      font-size: 12px;
      font-weight: 950;
    }

    .doc h2 {

      font-size: 26px;

      letter-spacing: 0;

      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

      gap: 10px;

    .info-card {
      padding: 13px;
      background: #fffdf7;
      box-shadow: 2px 2px 0 var(--line);
    }

    .info-card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .info-card p,

      color: var(--muted);
      font-size: 13px;
      font-weight: 650;

    .info-card p {
      margin: 0;

    .info-card ul,

      margin: 0;
      padding-left: 18px;
    }

    .callout {
      margin-top: 14px;
      padding: 14px;
      background: var(--mint);
      box-shadow: 2px 2px 0 var(--line);
      color: #064e3b;
      font-size: 13px;
      font-weight: 800;
    }

    .callout.warn {
      background: var(--rose);
      color: #7f1d1d;
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .action-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      background: var(--sky);
      box-shadow: 2px 2px 0 var(--line);
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 950;

    th {
      color: var(--muted);
      font-weight: 900;
    }

    .hidden {
      display: none;
    }

    const menu = document.getElementById("docMenu");
    const content = document.getElementById("docContent");
    const isFilePage = location.protocol === "file:";
    const dashboardBase = isFilePage ? "" : "/output/study-dashboard/";
    document.getElementById("backLink").href = `${dashboardBase}${isFilePage ? "index.html" : ""}#artifacts`;

    function cardHtml(section) {
      const list = section.list ? `<ul>${section.list.map((item) => `<li>${item}</li>`).join("")}</ul>` : "";
      const body = section.body ? `<p>${section.body}</p>` : "";
      return `<section class="info-card"><strong>${section.title}</strong>${body}${list}</section>`;
    }

    function renderDoc(key) {
      const doc = documents[key] || documents["week1-assignment"];
      document.querySelectorAll(".doc-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.doc === key);
      });

      const sections = doc.sections.map(cardHtml).join("");
      const callout = doc.callout ? `<div class="callout">${doc.callout}</div>` : "";
      const warning = doc.warning ? `<div class="callout warn">${doc.warning}</div>` : "";
      const links = [
        ...(doc.links || []),
        { label: "원본 파일 보기", href: doc.source, secondary: true }
      ];

      content.innerHTML = `
        <header class="doc-header">
          <div class="doc-kicker">${doc.emoji} ${doc.label}</div>
          <h2>${doc.title}</h2>
          <p class="doc-desc">${doc.desc}</p>
        </header>
        <div class="info-grid">${sections}</div>
        ${callout}
        ${warning}
        <div class="action-row">
          ${links.map((link) => `<a class="action-link ${link.secondary ? "secondary" : ""}" href="${link.href}">${link.label}</a>`).join("")}
        </div>
      `;
    }

    Object.entries(documents).forEach(([key, doc]) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "doc-button";
      button.dataset.doc = key;
      button.innerHTML = `<span class="emoji">${doc.emoji}</span><span><strong>${doc.title}</strong><span>${doc.label}</span></span>`;
      button.addEventListener("click", () => {
        location.hash = key;
        renderDoc(key);
      });
      menu.appendChild(button);
    });

    function currentKey() {
      const key = decodeURIComponent(location.hash.replace("#", ""));
      return documents[key] ? key : "week1-assignment";
    }

    window.addEventListener("hashchange", () => renderDoc(currentKey()));
    renderDoc(currentKey());
  </script>
