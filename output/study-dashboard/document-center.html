<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>문서센터 | 도시아재 GPTERS 23기 Codex 앱 스터디</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("gpters23-theme");
        const preferredTheme = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = savedTheme || preferredTheme;
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --ink: #15202b;
      --muted: #526275;
      --line: #344256;
      --bg: #edf2f4;
      --surface: #ffffff;
      --paper: #ffffff;
      --surface-soft: #f7f9fb;
      --border-soft: #c8d2dc;
      --grid-color: rgba(52, 66, 86, 0.055);
      --strong-bg: #15202b;
      --strong-ink: #ffffff;
      --mint: #dcfce7;
      --mint-ink: #065f46;
      --sky: #dbeafe;
      --sky-ink: #1d4ed8;
      --peach: #ffedd5;
      --rose: #ffe4e6;
      --rose-ink: #881337;
      --green: #0f766e;
      --blue: #2563eb;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
      --shadow-soft: 0 5px 16px rgba(15, 23, 42, 0.08);
      --shadow-hover: 0 10px 24px rgba(15, 23, 42, 0.14);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --ink: #eef3f8;
      --muted: #b3c0cf;
      --line: #64748b;
      --bg: #09111d;
      --surface: #131e2e;
      --paper: #101927;
      --surface-soft: #182436;
      --border-soft: #425169;
      --grid-color: rgba(148, 163, 184, 0.07);
      --strong-bg: #e5edf5;
      --strong-ink: #0b1320;
      --mint: #143c34;
      --mint-ink: #a7f3d0;
      --sky: #182f50;
      --sky-ink: #bfdbfe;
      --peach: #4b2d1d;
      --rose: #4a202a;
      --rose-ink: #fecdd3;
      --green: #5eead4;
      --blue: #93c5fd;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.32);
      --shadow-soft: 0 6px 18px rgba(0, 0, 0, 0.24);
      --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
      font-size: 16px;
      line-height: 1.68;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    button:focus-visible,
    a:focus-visible {
      outline: 3px solid var(--blue);
      outline-offset: 3px;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }

    .hero,
    .doc,
    .nav-card,
    .info-card,
    .callout {
      border: 1.5px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 16px;
      padding: 22px;
      background: var(--paper);
    }

    .eyebrow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 5px 9px;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      background: var(--mint);
      color: var(--mint-ink);
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
    }

    .badge.sky {
      background: var(--sky);
      color: var(--sky-ink);
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 780px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 650;
    }

    .hero-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .back-link,
    .theme-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 38px;
      padding: 8px 12px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      color: var(--ink);
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .back-link:hover,
    .theme-button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
    }

    .theme-icon {
      display: inline-flex;
      width: 20px;
      height: 20px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--sky);
      color: var(--sky-ink);
      font-weight: 950;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .nav-card {
      position: sticky;
      top: 14px;
      padding: 14px;
      background: var(--surface-soft);
    }

    .nav-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 950;
    }

    .doc-menu {
      display: grid;
      gap: 8px;
    }

    .doc-button {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 9px;
      align-items: center;
      width: 100%;
      min-height: 48px;
      padding: 9px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      color: var(--ink);
      cursor: pointer;
      text-align: left;
    }

    .doc-button:hover,
    .doc-button.active {
      transform: translate(-1px, -1px);
      background: var(--strong-bg);
      color: var(--strong-ink);
      box-shadow: var(--shadow-hover);
    }

    .doc-button .emoji {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: var(--sky);
      font-size: 16px;
    }

    .doc-button.active .emoji,
    .doc-button:hover .emoji {
      background: var(--surface);
    }

    .doc-button strong {
      display: block;
      font-size: 14px;
      line-height: 1.25;
    }

    .doc-button span:not(.emoji) {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .doc-button.active span:not(.emoji),
    .doc-button:hover span:not(.emoji) {
      color: var(--strong-ink);
      opacity: 0.78;
    }

    .doc {
      min-height: 620px;
      padding: 22px;
      background: var(--surface);
    }

    .doc-header {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1.5px solid var(--border-soft);
    }

    .doc-kicker {
      color: var(--blue);
      font-size: 12px;
      font-weight: 950;
    }

    .doc h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .doc-desc {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .info-card {
      padding: 13px;
      background: var(--surface-soft);
      box-shadow: var(--shadow-soft);
    }

    .info-card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .info-card p,
    .info-card li {
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .info-card p {
      margin: 0;
    }

    .info-card ul,
    .info-card ol {
      margin: 0;
      padding-left: 18px;
    }

    .callout {
      margin-top: 14px;
      padding: 14px;
      background: var(--mint);
      box-shadow: var(--shadow-soft);
      color: var(--mint-ink);
      font-size: 14px;
      font-weight: 800;
    }

    .callout.warn {
      background: var(--rose);
      color: var(--rose-ink);
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .action-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      background: var(--sky);
      box-shadow: var(--shadow-soft);
      color: var(--sky-ink);
      font-size: 13px;
      font-weight: 950;
    }

    .action-link.secondary {
      background: var(--surface);
      color: var(--ink);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 9px;
      border-bottom: 1px solid var(--border-soft);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 900;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 920px) {
      .hero,
      .layout,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .nav-card {
        position: static;
      }

      .hero-tools {
        justify-content: flex-start;
      }

      h1 {
        font-size: 27px;
      }
    }

    @media (max-width: 560px) {
      .shell {
        padding-inline: 12px;
      }

      .hero,
      .doc,
      .nav-card {
        padding: 16px;
      }

      .hero-tools {
        align-items: stretch;
        flex-direction: column;
      }

      .back-link,
      .theme-button {
        width: 100%;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">
          <span class="badge">📚 문서센터</span>
          <span class="badge sky">도시아재</span>
        </p>
        <h1>GPTERS 23기 Codex 앱 스터디 문서센터</h1>
        <p class="subtitle">대시보드의 주요 문서를 Markdown 원문이 아니라 발표와 공유에 적합한 HTML 카드 형태로 읽습니다.</p>
      </div>
      <div class="hero-tools" aria-label="문서센터 도구">
        <button class="theme-button" id="themeToggle" type="button" title="화면 테마를 전환합니다.">
          <span class="theme-icon" id="themeIcon" aria-hidden="true">☾</span>
          <span id="themeLabel">다크 모드</span>

      </div>
    </header>

    <section class="layout">
      <aside class="nav-card" aria-label="문서 목록">
        <p class="nav-title">문서 선택</p>
        <div class="doc-menu" id="docMenu"></div>
      </aside>

      <article class="doc" id="docContent" aria-live="polite"></article>
    </section>
  </main>

  <script>
    const themeStorageKey = "gpters23-theme";
    const themeToggle = document.getElementById("themeToggle");
    const themeIcon = document.getElementById("themeIcon");
    const themeLabel = document.getElementById("themeLabel");

    function syncThemeButton() {
      const isDark = document.documentElement.dataset.theme === "dark";
      themeIcon.textContent = isDark ? "☀" : "☾";
      themeLabel.textContent = isDark ? "라이트 모드" : "다크 모드";
      themeToggle.setAttribute("aria-label", isDark ? "라이트 모드로 전환" : "다크 모드로 전환");
      themeToggle.setAttribute("aria-pressed", String(isDark));
    }

    themeToggle.addEventListener("click", () => {
      const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = nextTheme;
      try {
        localStorage.setItem(themeStorageKey, nextTheme);
      } catch {
        // The selected theme still applies for the current page.
      }
      syncThemeButton();
    });

    syncThemeButton();

        sections: [
          { title: "기록할 것", list: ["실행 날짜", "사용한 입력자료", "Codex에게 준 지시", "생성된 산출물", "소요 시간", "사람이 수정한 내용"] },

    const isFilePage = location.protocol === "file:";
    const dashboardBase = isFilePage ? "" : "/output/study-dashboard/";

    function cardHtml(section) {
      const list = section.list ? `<ul>${section.list.map((item) => `<li>${item}</li>`).join("")}</ul>` : "";
      const body = section.body ? `<p>${section.body}</p>` : "";
      return `<section class="info-card"><strong>${section.title}</strong>${body}${list}</section>`;
    }

    function renderDoc(key) {
      const doc = documents[key] || documents["week1-assignment"];
      document.querySelectorAll(".doc-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.doc === key);
      });

      const sections = doc.sections.map(cardHtml).join("");
      const callout = doc.callout ? `<div class="callout">${doc.callout}</div>` : "";
      const warning = doc.warning ? `<div class="callout warn">${doc.warning}</div>` : "";
      const links = [
        ...(doc.links || []),
        { label: "원본 파일 보기", href: doc.source, secondary: true }
      ];

      content.innerHTML = `
        <header class="doc-header">
          <div class="doc-kicker">${doc.emoji} ${doc.label}</div>
          <h2>${doc.title}</h2>
          <p class="doc-desc">${doc.desc}</p>
        </header>
        <div class="info-grid">${sections}</div>
        ${callout}
        ${warning}
        <div class="action-row">
          ${links.map((link) => `<a class="action-link ${link.secondary ? "secondary" : ""}" href="${link.href}">${link.label}</a>`).join("")}
        </div>
      `;
    }

    Object.entries(documents).forEach(([key, doc]) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "doc-button";
      button.dataset.doc = key;
      button.innerHTML = `<span class="emoji">${doc.emoji}</span><span><strong>${doc.title}</strong><span>${doc.label}</span></span>`;
      button.addEventListener("click", () => {
        location.hash = key;
        renderDoc(key);
      });
      menu.appendChild(button);
    });

    function currentKey() {
      const key = decodeURIComponent(location.hash.replace("#", ""));
      return documents[key] ? key : "week1-assignment";
    }

    window.addEventListener("hashchange", () => renderDoc(currentKey()));
    renderDoc(currentKey());
  </script>
